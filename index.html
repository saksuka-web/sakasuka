<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grup Sitesi</title>
<style>
  body { 
    font-family: Arial, sans-serif; 
    margin:0; 
    padding:0; 
    text-align:center; 
    background:#1a1a2e; 
    color:#fff; 
  }
  header { 
    background:#162447; 
    color:#fff; 
    padding:20px; 
  }
  nav a { 
    color:#fff; 
    margin:0 15px; 
    text-decoration:none; 
    font-weight:bold; 
  }
  nav a:hover { 
    color:#e43f5a; 
  }
  .intro { 
    padding:30px; 
  }
  .intro img { 
    width:200px; 
    margin:10px; 
    border-radius:10px; 
    border:2px solid #fff; 
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .intro img:hover { 
    transform: scale(1.05); 
    box-shadow: 0 0 15px rgba(255,255,255,0.5); 
  }

  @media (max-width: 768px) {
    .intro img { width:45%; margin:5px; }
    nav a { display:inline-block; margin:5px 10px; }
  }

  @media (max-width: 480px) {
    .intro img { width:90%; margin:5px 0; }
    nav a { display:block; margin:10px 0; }
  }
</style>
</head>
<body>

<header>
  <h1>Şakşuka</h1>
  <nav>
    <a href="index.html">Anasayfa</a>
    <a href="galeri.html">Galeri</a>
  </nav>

  </div>
</div>

</body>
</html>
