<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grup Sitesi</title>

<style>
  body { 
    font-family: Arial, sans-serif; 
    margin:0; 
    padding:0; 
    text-align:center; 
    background:#1a1a2e; 
    color:#fff; 
  }
  header { 
    background:#162447; 
    padding:20px; 
  }
  nav a { 
    color:#fff; 
    margin:0 15px; 
    text-decoration:none; 
    font-weight:bold; 
  }
  nav a:hover { color:#e43f5a; }

  .intro { padding:30px; }

  .intro img { 
    width:200px; 
    margin:10px; 
    border-radius:10px; 
    border:2px solid #fff; 
  }
</style>
</head>
<body>

<header>
  <h1>Şakşuka</h1>
  <nav>
    <a href="index.html">Anasayfa</a>
    <a href="galeri.html">Galeri</a>
  </nav>
</header>

<div class="intro">

<!-- LOGIN -->
<div id="authBox">
  <h3>Giriş Yap / Kayıt Ol</h3>

  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Şifre"><br><br>

  <button onclick="register()">Kayıt Ol</button>
  <button onclick="login()">Giriş Yap</button>
  <button onclick="logout()">Çıkış Yap</button>

  <p id="userInfo"></p>
</div>

<h2>Şakşuka Üyeleri</h2>
<p>Grup üyeleri: Erdem, Ekrem, Osman, Abdurrahman...</p>

<div>
  <img src="resim/resim1.jpg">
  <img src="resim/resim2.jpg">
  <img src="resim/resim3.jpg">
  <img src="resim/resim4.jpg">
</div>

</div>

<!-- ✅ DOĞRU FIREBASE (compat sürüm) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD3Sva9Ja3bqNgFTf6Pi0bzsvw55P28h7s",
  authDomain: "saksuka-app.firebaseapp.com",
  projectId: "saksuka-app",
  storageBucket: "saksuka-app.firebasestorage.app",
  messagingSenderId: "506402651948",
  appId: "1:506402651948:web:42d9512b3081703ad0b689"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

// KAYIT
function register(){
  const email = emailInput();
  const password = passwordInput();

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("Kayıt başarılı 🔥"))
    .catch(err => alert(err.message));
}

// LOGIN
function login(){
  const email = emailInput();
  const password = passwordInput();

  auth.signInWithEmailAndPassword(email, password)
    .then(() => alert("Giriş başarılı 👑"))
    .catch(err => alert(err.message));
}

// LOGOUT
function logout(){
  auth.signOut();
  alert("Çıkış yapıldı");
}

// USER DURUMU
auth.onAuthStateChanged(user => {
  document.getElementById("userInfo").innerText =
    user ? "Giriş: " + user.email : "Giriş yapılmadı";
});

// yardımcı
function emailInput(){
  return document.getElementById("email").value;
}
function passwordInput(){
  return document.getElementById("password").value;
}
</script>

</body>
</html>
