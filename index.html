<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grup Sitesi</title>
<style>
  body { 
    font-family: Arial, sans-serif; 
    margin:0; 
    padding:0; 
    text-align:center; 
    background:#1a1a2e; 
    color:#fff; 
  }
  header { 
    background:#162447; 
    color:#fff; 
    padding:20px; 
  }
  nav a { 
    color:#fff; 
    margin:0 15px; 
    text-decoration:none; 
    font-weight:bold; 
  }
  nav a:hover { 
    color:#e43f5a; 
  }
  .intro { 
    padding:30px; 
  }
  .intro img { 
    width:200px; 
    margin:10px; 
    border-radius:10px; 
    border:2px solid #fff; 
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .intro img:hover { 
    transform: scale(1.05); 
    box-shadow: 0 0 15px rgba(255,255,255,0.5); 
  }

  @media (max-width: 768px) {
    .intro img { width:45%; margin:5px; }
    nav a { display:inline-block; margin:5px 10px; }
  }

  @media (max-width: 480px) {
    .intro img { width:90%; margin:5px 0; }
    nav a { display:block; margin:10px 0; }
  }
</style>
</head>
<body>

<header>
  <h1>Şakşuka</h1>
  <nav>
    <a href="index.html">Anasayfa</a>
    <a href="galeri.html">Galeri</a>
  </nav>
</header>

<div class="intro">

<div id="authBox">
  <h3>Giriş Yap / Kayıt Ol</h3>
  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Şifre"><br><br>

  <button onclick="register()">Kayıt Ol</button>
  <button onclick="login()">Giriş Yap</button>
  <button onclick="logout()">Çıkış Yap</button>

  <p id="userInfo"></p>
</div>

  <h2>Şakşuka Üyeleri</h2>
  <p>Grup üyeleri: Erdem,Ekrem,Osman,Abdurrahman,Hikmet,Mitat,Aslı,Berfin,Pınar,Zehra</p>

  <div>
    <img src="resim/resim1.jpg" alt="Üye 1">
    <img src="resim/resim2.jpg" alt="Üye 2">
    <img src="resim/resim3.jpg" alt="Üye 3">
    <img src="resim/resim4.jpg" alt="Üye 4">
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD3Sva9Ja3bqNgFTf6Pi0bzsvw55P28h7s",
  authDomain: "saksuka-app.firebaseapp.com",
  projectId: "saksuka-app",
  storageBucket: "saksuka-app.firebasestorage.app",
  messagingSenderId: "506402651948",
  appId: "1:506402651948:web:42d9512b3081703ad0b689"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// 🔥 LOGIN SİSTEMİ
function register(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("Kayıt başarılı 🔥"))
    .catch(err => alert(err.message));
}

function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => alert("Giriş başarılı 👑"))
    .catch(err => alert(err.message));
}

function logout(){
  auth.signOut();
  alert("Çıkış yapıldı");
}

auth.onAuthStateChanged(user => {
  document.getElementById("userInfo").innerText =
    user ? "Giriş yapıldı: " + user.email : "Giriş yapılmadı";
});
</script>

</body>
</html>
