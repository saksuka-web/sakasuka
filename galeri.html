<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    text-align:center;
    background:#1a1a2e;
    color:#fff;
  }

  header {
    background:#162447;
    color:#fff;
    padding:20px;
  }

  nav a {
    color:#fff;
    margin:0 15px;
    text-decoration:none;
    font-weight:bold;
  }

  nav a:hover {
    color:#e43f5a;
  }

  .gallery {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
  }

  .gallery img {
    width:200px;
    margin:10px;
    border-radius:10px;
    cursor:pointer;
    border:2px solid #fff;
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .gallery img:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255,255,255,0.5);
  }

  #lightbox {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
  }

  #lightbox img {
    max-width:90%;
    max-height:90%;
    border-radius:10px;
  }

  #prev,
  #next {
    position: absolute;
    top:50%;
    transform: translateY(-50%);
    font-size:40px;
    color:#fff;
    cursor:pointer;
    user-select:none;
    padding:10px;
  }

  #prev {
    left:10px;
  }

  #next {
    right:10px;
  }

  .pagination {
    text-align:center;
    margin:20px 0;
  }

  .pagination button {
    margin:0 5px;
    padding:8px 12px;
    border:none;
    border-radius:5px;
    background:#162447;
    color:#fff;
    cursor:pointer;
  }

  .pagination button.active {
    background:#e43f5a;
  }

  .pagination button:hover {
    background:#333;
  }

  @media (max-width:768px) {
    .gallery img {
      width:45%;
      margin:5px;
    }

    nav a {
      display:inline-block;
      margin:5px 10px;
    }
  }

  @media (max-width:480px) {
    .gallery img {
      width:90%;
      margin:5px 0;
    }

    nav a {
      display:block;
      margin:10px 0;
    }
  }
</style>
</head>

<body>

<header>
  <h1>Galeri</h1>

  <nav>
    <a href="index.html">Anasayfa</a>
    <a href="galeri.html">Galeri</a>
  </nav>
</header>

<div class="gallery" id="gallery"></div>

<div class="pagination" id="pagination"></div>

<div id="lightbox">
  <span id="prev">&#10094;</span>
  <img src="">
  <span id="next">&#10095;</span>
</div>

<script>

const totalImages = 227; // 🔥 30 tane daha eklendi
const imagesPerPage = 20;

const gallery = document.getElementById('gallery');
const pagination = document.getElementById('pagination');

let currentPage = 1;
let images = [];

// FOTOĞRAF YOLLARI
for(let i = 1; i <= totalImages; i++){
  images.push(`resim/resim${i}.jpg`);
}

// GALERİYİ GÖSTER
function renderGallery(page){

  gallery.innerHTML = '';

  let start = (page - 1) * imagesPerPage;
  let end = Math.min(start + imagesPerPage, images.length);

  for(let i = start; i < end; i++){

    const img = document.createElement('img');

    img.src = images[i];
    img.alt = 'Foto ' + (i + 1);

    img.addEventListener('click', () => {
      openLightbox(i);
    });

    gallery.appendChild(img);
  }
}

// SAYFALAMA
function renderPagination(){

  pagination.innerHTML = '';

  let totalPages = Math.ceil(images.length / imagesPerPage);

  for(let i = 1; i <= totalPages; i++){

    const btn = document.createElement('button');

    btn.textContent = i;

    if(i === currentPage){
      btn.classList.add('active');
    }

    btn.addEventListener('click', () => {

      currentPage = i;

      renderGallery(currentPage);
      renderPagination();
    });

    pagination.appendChild(btn);
  }
}

// LIGHTBOX
const lightbox = document.getElementById('lightbox');
const lightboxImg = lightbox.querySelector('img');

let currentIndex = 0;

function openLightbox(index){

  currentIndex = index;

  lightbox.style.display = 'flex';

  lightboxImg.src = images[currentIndex];
}

// GERİ
document.getElementById('prev').addEventListener('click', e => {

  e.stopPropagation();

  currentIndex = (currentIndex - 1 + images.length) % images.length;

  lightboxImg.src = images[currentIndex];
});

// İLERİ
document.getElementById('next').addEventListener('click', e => {

  e.stopPropagation();

  currentIndex = (currentIndex + 1) % images.length;

  lightboxImg.src = images[currentIndex];
});

// LIGHTBOX KAPAT
lightbox.addEventListener('click', () => {

  lightbox.style.display = 'none';
});

// BAŞLANGIÇ
renderGallery(currentPage);
renderPagination();

</script>

</body>
</html>
